<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dot.projects — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --yellow:  #F5C518;
      --navy:    #3D4472;
      --navy-lt: #5A618F;
      --gray:    #9095B0;
      --white:   #FFFFFF;
      --off-white: #F9F9FB;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--white);
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Decorative accent blobs ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(245,197,24,.12) 0%, transparent 70%);
      top: -160px;
      right: -160px;
    }

    body::after {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(61,68,114,.08) 0%, transparent 70%);
      bottom: -140px;
      left: -140px;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    /* ── Logo ── */
    .logo {
      width: 220px;
      margin: 0 auto 2.5rem;
      display: block;
    }

    /* ── Divider dot ── */
    .dot-divider {
      width: 10px;
      height: 10px;
      background: var(--yellow);
      border-radius: 50%;
      margin: 0 auto 2rem;
    }

    /* ── Heading ── */
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--navy);
      line-height: 1.15;
      margin-bottom: .75rem;
    }

    h1 span {
      color: var(--yellow);
    }

    /* ── Sub-text ── */
    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--navy-lt);
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
    }

    .countdown-block .number {
      background: var(--off-white);
      border: 2px solid rgba(61,68,114,.08);
      border-radius: 12px;
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -1px;
    }

    .countdown-block .label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── Notify form ── */
    .notify-form {
      display: flex;
      gap: .5rem;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }

    .notify-form input[type="email"] {
      flex: 1;
      padding: .75rem 1.1rem;
      border: 2px solid rgba(61,68,114,.15);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      color: var(--navy);
      background: var(--white);
      outline: none;
      transition: border-color .2s;
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--yellow);
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--gray);
    }

    .notify-form button {
      padding: .75rem 1.4rem;
      background: var(--yellow);
      color: var(--navy);
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .15s;
    }

    .notify-form button:hover {
      background: #e8b800;
      transform: translateY(-1px);
    }

    .notify-form button:active {
      transform: translateY(0);
    }

    /* ── Social links ── */
    .social {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .social a {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(61,68,114,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy-lt);
      text-decoration: none;
      transition: border-color .2s, color .2s, background .2s;
    }

    .social a:hover {
      border-color: var(--yellow);
      color: var(--navy);
      background: rgba(245,197,24,.08);
    }

    .social svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 3.5rem;
      font-size: .75rem;
      color: var(--gray);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .notify-form {
        flex-direction: column;
      }

      .countdown-block .number {
        width: 58px;
        height: 58px;
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <img class="logo" src="dot.logos6.png" alt="dot.projects logo" />

    <div class="dot-divider"></div>

    <h1>Something great is<br><span>coming soon.</span></h1>

    <p class="subtitle">
      We're working hard to bring you something amazing.<br>
      Stay tuned — we'll be ready before you know it.
    </p>

    <!-- Countdown -->
    <div class="countdown">
      <div class="countdown-block">
        <div class="number" id="days">00</div>
        <div class="label">Days</div>
      </div>
      <div class="countdown-block">
        <div class="number" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="countdown-block">
        <div class="number" id="minutes">00</div>
        <div class="label">Mins</div>
      </div>
      <div class="countdown-block">
        <div class="number" id="seconds">00</div>
        <div class="label">Secs</div>
      </div>
    </div>

    <!-- Notify form -->
    <form class="notify-form" onsubmit="handleNotify(event)">
      <input type="email" placeholder="Enter your email address" required />
      <button type="submit">Notify Me</button>
    </form>

    <!-- Social -->
    <div class="social">
      <!-- LinkedIn -->
      <a href="#" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452H17.21v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.987V9h3.102v1.561h.044c.432-.818 1.487-1.681 3.062-1.681 3.273 0 3.876 2.154 3.876 4.955v6.617zM5.337 7.433a1.8 1.8 0 1 1 0-3.6 1.8 1.8 0 0 1 0 3.6zm1.554 13.019H3.782V9h3.109v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
      <!-- Instagram -->
      <a href="#" aria-label="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </a>
      <!-- Twitter / X -->
      <a href="#" aria-label="Twitter">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
        </svg>
      </a>
    </div>

    <p class="footer">&copy; 2026 dot.projects. All rights reserved.</p>
  </div>

  <script>
    // Set your launch date here
    const launchDate = new Date('2026-09-01T00:00:00').getTime();

    function updateCountdown() {
      const now = Date.now();
      const distance = launchDate - now;

      if (distance <= 0) {
        document.querySelector('.countdown').innerHTML = '<p style="color:var(--yellow);font-weight:600;">We are Live!</p>';
        return;
      }

      const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = String(days).padStart(2, '0');
      document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    function handleNotify(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = "You're on the list!";
      btn.style.background = '#3D4472';
      btn.style.color = '#fff';
      btn.disabled = true;
      e.target.querySelector('input').disabled = true;
    }
  </script>
</body>
</html>
